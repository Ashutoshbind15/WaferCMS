services:
  cms-postgres:
    image: postgres:18-trixie
    container_name: portfolio-cms-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: cms
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - portfolio-cms-postgres-data:/var/lib/postgresql

  portfolio-postgres:
    image: postgres:18-trixie
    container_name: portfolio-app-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: portfolio
    ports:
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - portfolio-app-postgres-data:/var/lib/postgresql

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    command: /data
    restart: unless-stopped

volumes:
  portfolio-cms-postgres-data:
  portfolio-app-postgres-data:
  rustfs_data:
