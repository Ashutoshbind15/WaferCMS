services:
  cms-postgres:
    image: postgres:18-trixie
    container_name: wafercms-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: cms
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - wafercms-postgres-data:/var/lib/postgresql

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    command: /data
    restart: unless-stopped

volumes:
  wafercms-postgres-data:
  rustfs_data:
