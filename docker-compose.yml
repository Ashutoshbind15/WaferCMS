services:
  cms-postgres:
    image: postgres:18-trixie
    container_name: wafercms-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: cms
    # Not published by default — use docker-compose.dev.yml for host access.
    restart: unless-stopped
    volumes:
      - wafercms-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.10
    # Not published by default — use docker-compose.dev.yml for host access.
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
    volumes:
      - rustfs_data:/data
    command: ["/data"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cms-server:
    build:
      context: .
      dockerfile: cms-server/Dockerfile
    container_name: wafercms-server
    ports:
      - "${CMS_SERVER_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-}
      CMS_STRICT_CONFIG: ${CMS_STRICT_CONFIG:-}
      CMS_TRUST_PROXY: ${CMS_TRUST_PROXY:-}
      CMS_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cms-postgres:5432/cms
      CMS_PUBLIC_BASE_URL: ${CMS_PUBLIC_BASE_URL:-http://localhost:3001}
      CMS_IMAGE_MAX_BYTES: ${CMS_IMAGE_MAX_BYTES:-20971520}
      CMS_IMAGE_MAX_DIMENSION: ${CMS_IMAGE_MAX_DIMENSION:-4096}
      CMS_UPLOAD_MAX_BYTES: ${CMS_UPLOAD_MAX_BYTES:-}
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-cms-files}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CMS_API_KEY_PEPPER: ${CMS_API_KEY_PEPPER:-}
      CMS_REQUIRE_API_KEY: ${CMS_REQUIRE_API_KEY:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CMS_BOOTSTRAP_ADMIN_USERNAME: ${CMS_BOOTSTRAP_ADMIN_USERNAME:-}
      CMS_BOOTSTRAP_ADMIN_PASSWORD: ${CMS_BOOTSTRAP_ADMIN_PASSWORD:-}
      CMS_FIRST_USER_LOCK_KEY: ${CMS_FIRST_USER_LOCK_KEY:-1234567890}
      CMS_AI_DRAFTS_ENABLED: ${CMS_AI_DRAFTS_ENABLED:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-}
    depends_on:
      cms-postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    restart: unless-stopped

  cms-client:
    build:
      context: .
      dockerfile: cms-client/Dockerfile
    container_name: wafercms-client
    ports:
      - "${CMS_CLIENT_PORT:-8080}:80"
    environment:
      CMS_API_BASE: ${CMS_API_BASE:-${VITE_CMS_API_BASE:-http://localhost:3001}}
      CMS_AI_DRAFTS_ENABLED: ${CMS_AI_DRAFTS_ENABLED:-${VITE_CMS_AI_DRAFTS_ENABLED:-false}}
      CMS_AI_AGENT_ENABLED: ${CMS_AI_AGENT_ENABLED:-${VITE_CMS_AI_AGENT_ENABLED:-false}}
    depends_on:
      - cms-server
    restart: unless-stopped

volumes:
  wafercms-postgres-data:
  rustfs_data:
