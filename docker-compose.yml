services:
  postgres:
    image: postgres:18-trixie
    container_name: drizzle-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:${POSTGRES_PORT}"
    restart: unless-stopped
    volumes:
      - drizzle-postgres-data:/var/lib/postgresql
  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    command: /data
    restart: unless-stopped

volumes:
  drizzle-postgres-data:
  rustfs_data:
