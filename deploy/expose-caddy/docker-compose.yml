# Optional TLS edge for public admin + API.
# Usage (from repo root):
#   cp deploy/expose-caddy/.env.example deploy/expose-caddy/.env
#   # edit secrets + hostnames, then:
#   docker compose -f docker-compose.yml -f deploy/expose-caddy/docker-compose.yml \
#     --env-file deploy/expose-caddy/.env up -d
#
# Swap this Caddy service for Cloudflare / Traefik / nginx — WaferCMS does not require Caddy.

services:
  cms-server:
    ports: !override []
    environment:
      NODE_ENV: production
      CMS_TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      CMS_PUBLIC_BASE_URL: ${CMS_PUBLIC_BASE_URL:?set https CMS_PUBLIC_BASE_URL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:?set https CORS_ORIGIN (admin UI origin)}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      CMS_API_KEY_PEPPER: ${CMS_API_KEY_PEPPER:?set CMS_API_KEY_PEPPER}
      CMS_REQUIRE_API_KEY: ${CMS_REQUIRE_API_KEY:-true}
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY_ID:?set a strong RUSTFS_ACCESS_KEY_ID}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_ACCESS_KEY:?set a strong RUSTFS_SECRET_ACCESS_KEY}

  cms-client:
    ports: !override []
    environment:
      CMS_API_BASE: ${CMS_API_BASE:?set https CMS_API_BASE (browser-reachable API origin)}

  rustfs:
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY_ID:?set a strong RUSTFS_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_ACCESS_KEY:?set a strong RUSTFS_SECRET_ACCESS_KEY}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-false}

  caddy:
    image: caddy:2.11.4-alpine
    container_name: wafercms-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    environment:
      CMS_ADMIN_HOST: ${CMS_ADMIN_HOST:?set CMS_ADMIN_HOST e.g. cms.example.com}
      CMS_API_HOST: ${CMS_API_HOST:?set CMS_API_HOST e.g. api.example.com}
    volumes:
      - ./deploy/expose-caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - cms-client
      - cms-server

volumes:
  caddy_data:
  caddy_config:
