packages:
  - "cms-client"
  - "cms-server"
  - "packages/*"
minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  - "@scribblesvg/*"
overrides:
  '@hono/node-server@<1.19.13': '>=1.19.13'
  brace-expansion@>=5.0.0 <5.0.6: '>=5.0.6'
  esbuild@<=0.24.2: '>=0.25.0'
  fast-uri@<=3.1.0: '>=3.1.1'
  fast-uri@<=3.1.1: '>=3.1.2'
  fast-xml-builder@<=1.1.6: '>=1.1.7'
  fast-xml-parser@<5.7.0: '>=5.7.0'
  hono@<4.12.12: '>=4.12.12'
  hono@<4.12.14: '>=4.12.14'
  hono@<4.12.16: '>=4.12.16'
  hono@<4.12.18: '>=4.12.18'
  hono@>=4.0.0 <=4.12.11: '>=4.12.12'
  ip-address@<=10.1.0: '>=10.1.1'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
saveExact: true
# note: was commented out when running shadcn init, also during adding bento-grid
# component
strictDepBuilds: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver@6.3.1"
