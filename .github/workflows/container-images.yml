name: Container images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: cms-server/Dockerfile
            package_json: cms-server/package.json
            image_suffix: wafercms-server
          - name: client
            dockerfile: cms-client/Dockerfile
            package_json: cms-client/package.json
            image_suffix: wafercms-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        env:
          IMAGE: ghcr.io/ashutoshbind15/${{ matrix.image_suffix }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          VERSION="$(node -p "require('./${{ matrix.package_json }}').version")"
          REVISION="${{ github.sha }}"

          TAGS=(
            "${IMAGE}:sha-${SHORT_SHA}"
            "${IMAGE}:latest"
          )

          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "${TAGS[0]}" \
            -t "${TAGS[1]}" \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "REVISION=${REVISION}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.licenses=MIT" \
            .

          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done

          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${TAGS[0]}" | awk -F@ '{print $2}')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "local_tag=${TAGS[0]}" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.build.outputs.local_tag }}
          format: cyclonedx-json
          artifact-name: wafercms-${{ matrix.name }}.cdx.json
          output-file: wafercms-${{ matrix.name }}.cdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Generate SPDX SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.build.outputs.local_tag }}
          format: spdx-json
          artifact-name: wafercms-${{ matrix.name }}.spdx.json
          output-file: wafercms-${{ matrix.name }}.spdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Extract in-image license notices
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='${{ steps.build.outputs.local_tag }}'
          CID="$(docker create "$IMAGE")"
          mkdir -p "licenses-${{ matrix.name }}"
          docker cp "${CID}:/licenses/." "licenses-${{ matrix.name }}/"
          docker rm "${CID}"
          ls -la "licenses-${{ matrix.name }}/"
          test -f "licenses-${{ matrix.name }}/LICENSE"
          test -f "licenses-${{ matrix.name }}/THIRD_PARTY_NOTICES"

      - name: Upload license notices
        uses: actions/upload-artifact@v4
        with:
          name: wafercms-${{ matrix.name }}-licenses
          path: licenses-${{ matrix.name }}/

      - name: Attest CycloneDX SBOM
        if: steps.build.outputs.digest != ''
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ steps.build.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: wafercms-${{ matrix.name }}.cdx.json
          push-to-registry: true
